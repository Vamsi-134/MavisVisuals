<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<title>Edit Media</title>

<link rel="stylesheet" href="/css/admin.css">

</head>

<body>

<div class="container">

<div class="card">

<h2>Edit Media</h2>

<form action="/update-media"
      method="post"
      enctype="multipart/form-data">

<input type="hidden"
       name="id"
       th:value="${media.id}">

<label>Title</label>

<input
type="text"
name="title"
th:value="${media.title}">

<label>Description</label>

<textarea
name="description"
rows="4"
th:text="${media.description}">
</textarea>

<label>Category</label>
<label>Current File</label>

<div style="margin-bottom:20px;">

    <img th:if="${media.type=='Image'}"
         th:src="'https://mavisvisuals-vamsi-storage.s3.ap-south-1.amazonaws.com/' + ${media.filename}"
         width="250">

    <video th:if="${media.type=='Video'}"
           width="250"
           controls>
        <source th:src="'https://mavisvisuals-vamsi-storage.s3.ap-south-1.amazonaws.com/' + ${media.filename}">
    </video>

</div>

<label>Replace File (Optional)</label>

<input type="file"
       name="file">

<input
type="text"
name="category"
th:value="${media.category}">

<label>Cover Image</label>

<input
type="checkbox"
name="coverImage"
th:checked="${media.coverImage}">

<button>
Update
</button>

</form>

</div>

</div>

</body>
</html>
