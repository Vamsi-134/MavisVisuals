<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reset Password</title>
</head>

<body>

<h2>Reset Password</h2>

<form action="/reset-password" method="post">

    <input type="hidden"
           name="token"
           th:value="${token}">

    <input type="password"
           name="password"
           placeholder="New Password"
           required>

    <br><br>

    <button type="submit">
        Change Password
    </button>

</form>

<p th:text="${message}"></p>

</body>
</html>
