<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Edit Category</title>

<link rel="stylesheet" href="/css/admin.css">

</head>

<body>

<div class="container">

<div class="card">

<h2>Edit Category</h2>

<form action="/update-category" method="post">

<input type="hidden"
       name="id"
       th:value="${category.id}">

<label>Category Name</label>

<input type="text"
       name="name"
       th:value="${category.name}"
       required>

<button type="submit">

Update Category

</button>

</form>

</div>

</div>

</body>

</html>
